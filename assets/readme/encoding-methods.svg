<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="100%" role="img" aria-labelledby="encTitle encDesc">
  <title id="encTitle">三种编码方法对比</title>
  <desc id="encDesc">LabelEncoder、OrdinalEncoder、OneHotEncoder 三种编码方法的输入输出对比与适用场景</desc>

  <defs>
    <marker id="encArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#B8860B"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="320" rx="20" ry="20" fill="#F4F1EA"/>

  <g id="enc-header" transform="translate(600 44)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" text-rendering="geometricPrecision">
    <text x="0" y="0" font-size="26" font-weight="700" fill="#1A1A1A" text-anchor="middle">三种编码方法对比</text>
    <text x="0" y="24" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#5B7553" text-anchor="middle" letter-spacing="1">label / ordinal / onehot</text>
  </g>

  <g id="enc-cards" transform="translate(48 100)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" text-rendering="geometricPrecision">

    <g id="enc-label" transform="translate(0 0)">
      <rect x="0" y="0" width="336" height="200" rx="10" ry="10" fill="#FFFFFF" stroke="#5B7553" stroke-width="1"/>
      <text x="168" y="30" font-size="18" font-weight="700" fill="#1A1A1A" text-anchor="middle">LabelEncoder</text>
      <text x="168" y="50" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#8B8680" text-anchor="middle">目标列 y,二分类或多分类标签</text>

      <g transform="translate(48 70)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">
        <rect x="0" y="0" width="100" height="24" fill="none" stroke="#5B7553" stroke-width="1"/>
        <text x="50" y="16" fill="#5B7553" text-anchor="middle">cat</text>
        <rect x="0" y="24" width="100" height="24" fill="none" stroke="#5B7553" stroke-width="1"/>
        <text x="50" y="40" fill="#5B7553" text-anchor="middle">dog</text>
        <rect x="0" y="48" width="100" height="24" fill="none" stroke="#5B7553" stroke-width="1"/>
        <text x="50" y="64" fill="#5B7553" text-anchor="middle">bird</text>

        <line x1="110" y1="36" x2="138" y2="36" stroke="#B8860B" stroke-width="1.4" marker-end="url(#encArrow)"/>

        <rect x="148" y="0" width="100" height="24" fill="#5B7553" fill-opacity="0.18" stroke="#5B7553" stroke-width="1"/>
        <text x="198" y="16" fill="#1A1A1A" text-anchor="middle">0</text>
        <rect x="148" y="24" width="100" height="24" fill="#5B7553" fill-opacity="0.18" stroke="#5B7553" stroke-width="1"/>
        <text x="198" y="40" fill="#1A1A1A" text-anchor="middle">1</text>
        <rect x="148" y="48" width="100" height="24" fill="#5B7553" fill-opacity="0.18" stroke="#5B7553" stroke-width="1"/>
        <text x="198" y="64" fill="#1A1A1A" text-anchor="middle">2</text>
      </g>

      <line x1="32" y1="158" x2="304" y2="158" stroke="#8B8680" stroke-width="0.6" stroke-opacity="0.5"/>
      <text x="168" y="180" font-size="12" fill="#5B7553" text-anchor="middle">单列目标标签,适合 y 而非 X</text>
    </g>

    <g id="enc-ordinal" transform="translate(384 0)">
      <rect x="0" y="0" width="336" height="200" rx="10" ry="10" fill="#FFFFFF" stroke="#5B7553" stroke-width="1"/>
      <text x="168" y="30" font-size="18" font-weight="700" fill="#1A1A1A" text-anchor="middle">OrdinalEncoder</text>
      <text x="168" y="50" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#8B8680" text-anchor="middle">特征列 X,有序类别转整数</text>

      <g transform="translate(48 70)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">
        <rect x="0" y="0" width="100" height="24" fill="none" stroke="#5B7553" stroke-width="1"/>
        <text x="50" y="16" fill="#5B7553" text-anchor="middle">low</text>
        <rect x="0" y="24" width="100" height="24" fill="none" stroke="#5B7553" stroke-width="1"/>
        <text x="50" y="40" fill="#5B7553" text-anchor="middle">mid</text>
        <rect x="0" y="48" width="100" height="24" fill="none" stroke="#5B7553" stroke-width="1"/>
        <text x="50" y="64" fill="#5B7553" text-anchor="middle">high</text>

        <line x1="110" y1="36" x2="138" y2="36" stroke="#B8860B" stroke-width="1.4" marker-end="url(#encArrow)"/>

        <rect x="148" y="0" width="100" height="24" fill="#5B7553" fill-opacity="0.18" stroke="#5B7553" stroke-width="1"/>
        <text x="198" y="16" fill="#1A1A1A" text-anchor="middle">0</text>
        <rect x="148" y="24" width="100" height="24" fill="#5B7553" fill-opacity="0.18" stroke="#5B7553" stroke-width="1"/>
        <text x="198" y="40" fill="#1A1A1A" text-anchor="middle">1</text>
        <rect x="148" y="48" width="100" height="24" fill="#5B7553" fill-opacity="0.18" stroke="#5B7553" stroke-width="1"/>
        <text x="198" y="64" fill="#1A1A1A" text-anchor="middle">2</text>
      </g>

      <line x1="32" y1="158" x2="304" y2="158" stroke="#8B8680" stroke-width="0.6" stroke-opacity="0.5"/>
      <text x="168" y="180" font-size="12" fill="#5B7553" text-anchor="middle">保留序关系,树模型可直接用</text>
    </g>

    <g id="enc-onehot" transform="translate(768 0)">
      <rect x="0" y="0" width="336" height="200" rx="10" ry="10" fill="#FFFFFF" stroke="#5B7553" stroke-width="1"/>
      <text x="168" y="30" font-size="18" font-weight="700" fill="#1A1A1A" text-anchor="middle">OneHotEncoder</text>
      <text x="168" y="50" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" fill="#8B8680" text-anchor="middle">特征列 X,无序类别转哑变量</text>

      <g transform="translate(36 70)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11">
        <rect x="0" y="0" width="70" height="24" fill="none" stroke="#5B7553" stroke-width="1"/>
        <text x="35" y="16" fill="#5B7553" text-anchor="middle">red</text>
        <rect x="0" y="24" width="70" height="24" fill="none" stroke="#5B7553" stroke-width="1"/>
        <text x="35" y="40" fill="#5B7553" text-anchor="middle">green</text>
        <rect x="0" y="48" width="70" height="24" fill="none" stroke="#5B7553" stroke-width="1"/>
        <text x="35" y="64" fill="#5B7553" text-anchor="middle">blue</text>

        <line x1="80" y1="36" x2="108" y2="36" stroke="#B8860B" stroke-width="1.4" marker-end="url(#encArrow)"/>

        <rect x="118" y="0" width="22" height="24" fill="#5B7553" fill-opacity="0.18" stroke="#5B7553" stroke-width="1"/>
        <text x="129" y="16" fill="#1A1A1A" text-anchor="middle">1</text>
        <rect x="140" y="0" width="22" height="24" fill="#FFFFFF" stroke="#5B7553" stroke-width="1"/>
        <text x="151" y="16" fill="#8B8680" text-anchor="middle">0</text>
        <rect x="162" y="0" width="22" height="24" fill="#FFFFFF" stroke="#5B7553" stroke-width="1"/>
        <text x="173" y="16" fill="#8B8680" text-anchor="middle">0</text>

        <rect x="118" y="24" width="22" height="24" fill="#FFFFFF" stroke="#5B7553" stroke-width="1"/>
        <text x="129" y="40" fill="#8B8680" text-anchor="middle">0</text>
        <rect x="140" y="24" width="22" height="24" fill="#5B7553" fill-opacity="0.18" stroke="#5B7553" stroke-width="1"/>
        <text x="151" y="40" fill="#1A1A1A" text-anchor="middle">1</text>
        <rect x="162" y="24" width="22" height="24" fill="#FFFFFF" stroke="#5B7553" stroke-width="1"/>
        <text x="173" y="40" fill="#8B8680" text-anchor="middle">0</text>

        <rect x="118" y="48" width="22" height="24" fill="#FFFFFF" stroke="#5B7553" stroke-width="1"/>
        <text x="129" y="64" fill="#8B8680" text-anchor="middle">0</text>
        <rect x="140" y="48" width="22" height="24" fill="#FFFFFF" stroke="#5B7553" stroke-width="1"/>
        <text x="151" y="64" fill="#8B8680" text-anchor="middle">0</text>
        <rect x="162" y="48" width="22" height="24" fill="#5B7553" fill-opacity="0.18" stroke="#5B7553" stroke-width="1"/>
        <text x="173" y="64" fill="#1A1A1A" text-anchor="middle">1</text>
      </g>

      <line x1="32" y1="158" x2="304" y2="158" stroke="#8B8680" stroke-width="0.6" stroke-opacity="0.5"/>
      <text x="168" y="180" font-size="12" fill="#5B7553" text-anchor="middle">避免伪序,线性 / 距离类模型首选</text>
    </g>

  </g>

  <text x="600" y="304" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#8B8680" text-anchor="middle" letter-spacing="1">树模型可接受序号编码,线性 / 距离类模型更偏好独热编码以避免引入伪序</text>
</svg>
