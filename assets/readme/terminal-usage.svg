<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="100%" role="img" aria-labelledby="termTitle termDesc">
  <title id="termTitle">运行命令</title>
  <desc id="termDesc">特征工程项目运行命令卡片:安装依赖 pandas numpy scikit-learn,以及按主题运行各特征工程脚本的命令</desc>

  <rect x="0" y="0" width="1200" height="200" rx="16" ry="16" fill="#F4F1EA"/>

  <g id="terminal" transform="translate(48 24)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" text-rendering="geometricPrecision">

    <rect x="0" y="0" width="1104" height="152" rx="10" ry="10" fill="#1A1A1A"/>

    <g id="term-titlebar">
      <rect x="0" y="0" width="1104" height="28" rx="10" ry="10" fill="#2A2A2A"/>
      <rect x="0" y="18" width="1104" height="10" fill="#2A2A2A"/>
      <circle cx="20" cy="14" r="5" fill="#B8860B" opacity="0.7"/>
      <circle cx="38" cy="14" r="5" fill="#5B7553" opacity="0.7"/>
      <circle cx="56" cy="14" r="5" fill="#8B8680" opacity="0.5"/>
      <text x="552" y="18" font-size="11" fill="#8B8680" text-anchor="middle" letter-spacing="1">feature-engineering / bash</text>
    </g>

    <g id="term-content" transform="translate(24 50)" font-size="13">
      <text x="0" y="0" fill="#5B7553">$</text>
      <text x="16" y="0" fill="#F4F1EA">pip install</text>
      <text x="120" y="0" fill="#B8860B">pandas numpy scikit-learn</text>

      <text x="0" y="26" fill="#5B7553">$</text>
      <text x="16" y="26" fill="#F4F1EA">python</text>
      <text x="80" y="26" fill="#B8860B">特征编码.py</text>
      <text x="184" y="26" fill="#8B8680"># LabelEncoder / OrdinalEncoder / OneHotEncoder</text>

      <text x="0" y="52" fill="#5B7553">$</text>
      <text x="16" y="52" fill="#F4F1EA">python</text>
      <text x="80" y="52" fill="#B8860B">特征缩放.py</text>
      <text x="184" y="52" fill="#8B8680"># Standard / MinMax / Robust / Normalizer</text>

      <text x="0" y="78" fill="#5B7553">$</text>
      <text x="16" y="78" fill="#F4F1EA">python</text>
      <text x="80" y="78" fill="#B8860B">missing_values.py</text>
      <text x="248" y="78" fill="#8B8680"># isnull / dropna / fillna</text>
    </g>

  </g>
</svg>
