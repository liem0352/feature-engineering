<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="100%" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Python 特征工程实践</title>
  <desc id="heroDesc">特征矩阵变换示意:原始特征列经 encode / scale / select / bin / impute 变换为变换后特征列,再送入机器学习模型</desc>

  <defs>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#B8860B"/>
    </marker>
    <marker id="arrowMuted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8B8680"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="360" rx="26" ry="26" fill="#F4F1EA"/>

  <g id="title-block" transform="translate(0 36)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" text-rendering="geometricPrecision">
    <text x="600" y="14" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#8B8680" text-anchor="middle" letter-spacing="3">MACHINE LEARNING / FEATURE ENGINEERING</text>
    <text x="600" y="64" font-size="44" font-weight="700" fill="#1A1A1A" text-anchor="middle">Python 特征工程实践</text>
    <text x="600" y="92" font-size="17" fill="#5B7553" text-anchor="middle">把特征列从原始形态变换为模型可用的形态</text>
  </g>

