  <text x="600" y="346" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#8B8680" text-anchor="middle" letter-spacing="1">pandas / numpy / scikit-learn / 鸢尾花 / Statlog Vehicle</text>
