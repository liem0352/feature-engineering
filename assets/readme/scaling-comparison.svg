<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="100%" role="img" aria-labelledby="scTitle scDesc">
  <title id="scTitle">四种缩放方法对比</title>
  <desc id="scDesc">StandardScaler、MinMaxScaler、RobustScaler、Normalizer 四种缩放方法的范围、公式与适用场景</desc>

  <rect x="0" y="0" width="1200" height="280" rx="20" ry="20" fill="#F4F1EA"/>

  <g id="sc-header" transform="translate(600 40)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" text-rendering="geometricPrecision">
    <text x="0" y="0" font-size="24" font-weight="700" fill="#1A1A1A" text-anchor="middle">四种缩放方法对比</text>
    <text x="0" y="22" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#5B7553" text-anchor="middle" letter-spacing="1">standard / minmax / robust / normalizer</text>
  </g>

  <g id="sc-cards" transform="translate(48 90)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif" text-rendering="geometricPrecision">

    <g id="sc-standard" transform="translate(0 0)">
      <rect x="0" y="0" width="264" height="160" rx="10" ry="10" fill="#FFFFFF" stroke="#5B7553" stroke-width="1"/>
      <text x="132" y="28" font-size="17" font-weight="700" fill="#1A1A1A" text-anchor="middle">StandardScaler</text>
      <text x="132" y="48" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#B8860B" text-anchor="middle">(x - mu) / sigma</text>
      <g transform="translate(56 60)">
        <line x1="0" y1="20" x2="152" y2="20" stroke="#8B8680" stroke-width="0.8"/>
        <line x1="76" y1="6" x2="76" y2="34" stroke="#8B8680" stroke-width="0.8" stroke-dasharray="2 2"/>
        <circle cx="40" cy="20" r="3" fill="#5B7553"/>
        <circle cx="60" cy="20" r="3" fill="#5B7553"/>
        <circle cx="76" cy="20" r="3" fill="#5B7553"/>
        <circle cx="92" cy="20" r="3" fill="#5B7553"/>
        <circle cx="112" cy="20" r="3" fill="#5B7553"/>
        <text x="76" y="48" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" fill="#8B8680" text-anchor="middle">mean=0 std=1</text>
      </g>
      <line x1="32" y1="124" x2="232" y2="124" stroke="#8B8680" stroke-width="0.6" stroke-opacity="0.5"/>
      <text x="132" y="146" font-size="12" fill="#5B7553" text-anchor="middle">z-score,适合梯度类算法</text>
    </g>

    <g id="sc-minmax" transform="translate(280 0)">
      <rect x="0" y="0" width="264" height="160" rx="10" ry="10" fill="#FFFFFF" stroke="#5B7553" stroke-width="1"/>
      <text x="132" y="28" font-size="17" font-weight="700" fill="#1A1A1A" text-anchor="middle">MinMaxScaler</text>
      <text x="132" y="48" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#B8860B" text-anchor="middle">(x - min) / (max - min)</text>
      <g transform="translate(56 60)">
        <rect x="0" y="14" width="152" height="12" fill="#5B7553" fill-opacity="0.18" stroke="#5B7553" stroke-width="0.8"/>
        <circle cx="16" cy="20" r="3" fill="#5B7553"/>
        <circle cx="48" cy="20" r="3" fill="#5B7553"/>
        <circle cx="80" cy="20" r="3" fill="#5B7553"/>
        <circle cx="112" cy="20" r="3" fill="#5B7553"/>
        <circle cx="136" cy="20" r="3" fill="#5B7553"/>
        <text x="0" y="48" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" fill="#8B8680" text-anchor="start">0</text>
        <text x="152" y="48" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" fill="#8B8680" text-anchor="end">1</text>
      </g>
      <line x1="32" y1="124" x2="232" y2="124" stroke="#8B8680" stroke-width="0.6" stroke-opacity="0.5"/>
      <text x="132" y="146" font-size="12" fill="#5B7553" text-anchor="middle">压缩到 [0, 1],对异常值敏感</text>
    </g>

    <g id="sc-robust" transform="translate(560 0)">
      <rect x="0" y="0" width="264" height="160" rx="10" ry="10" fill="#FFFFFF" stroke="#5B7553" stroke-width="1"/>
      <text x="132" y="28" font-size="17" font-weight="700" fill="#1A1A1A" text-anchor="middle">RobustScaler</text>
      <text x="132" y="48" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#B8860B" text-anchor="middle">(x - median) / IQR</text>
      <g transform="translate(56 60)">
        <line x1="0" y1="20" x2="152" y2="20" stroke="#8B8680" stroke-width="0.8"/>
        <line x1="48" y1="6" x2="48" y2="34" stroke="#5B7553" stroke-width="1.2"/>
        <line x1="104" y1="6" x2="104" y2="34" stroke="#5B7553" stroke-width="1.2"/>
        <rect x="48" y="14" width="56" height="12" fill="#5B7553" fill-opacity="0.20" stroke="none"/>
        <circle cx="20" cy="20" r="3" fill="#5B7553"/>
        <circle cx="76" cy="20" r="3" fill="#5B7553"/>
        <circle cx="132" cy="20" r="3" fill="#5B7553"/>
        <text x="76" y="48" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" fill="#8B8680" text-anchor="middle">median / IQR</text>
      </g>
      <line x1="32" y1="124" x2="232" y2="124" stroke="#8B8680" stroke-width="0.6" stroke-opacity="0.5"/>
      <text x="132" y="146" font-size="12" fill="#5B7553" text-anchor="middle">抗异常值,适合长尾分布</text>
    </g>

    <g id="sc-normalizer" transform="translate(840 0)">
      <rect x="0" y="0" width="264" height="160" rx="10" ry="10" fill="#FFFFFF" stroke="#5B7553" stroke-width="1"/>
      <text x="132" y="28" font-size="17" font-weight="700" fill="#1A1A1A" text-anchor="middle">Normalizer</text>
      <text x="132" y="48" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#B8860B" text-anchor="middle">x / ||x||  (L2)</text>
      <g transform="translate(56 60)">
        <circle cx="76" cy="20" r="16" fill="none" stroke="#5B7553" stroke-width="0.8" stroke-dasharray="2 2"/>
        <line x1="76" y1="20" x2="40" y2="6" stroke="#5B7553" stroke-width="1.4"/>
        <line x1="76" y1="20" x2="112" y2="8" stroke="#5B7553" stroke-width="1.4"/>
        <line x1="76" y1="20" x2="100" y2="36" stroke="#5B7553" stroke-width="1.4"/>
        <circle cx="40" cy="6" r="2.5" fill="#B8860B"/>
        <circle cx="112" cy="8" r="2.5" fill="#B8860B"/>
        <circle cx="100" cy="36" r="2.5" fill="#B8860B"/>
        <text x="76" y="48" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" fill="#8B8680" text-anchor="middle">row-wise L2</text>
      </g>
      <line x1="32" y1="124" x2="232" y2="124" stroke="#8B8680" stroke-width="0.6" stroke-opacity="0.5"/>
      <text x="132" y="146" font-size="12" fill="#5B7553" text-anchor="middle">按行归一,适合文本 / 距离</text>
    </g>

  </g>

  <text x="600" y="266" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#8B8680" text-anchor="middle" letter-spacing="1">KNN / SVM / KMeans / PCA 等基于距离或梯度的算法对量纲敏感,缩放后收敛更快、表现更稳</text>
</svg>
